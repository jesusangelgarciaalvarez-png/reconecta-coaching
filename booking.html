<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preload" href="/hero_reconecta_v3.png" as="image">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <title>Reserva | Reconecta</title>
    <!-- Last Update: 2026-03-01 20:55 - Hourly Schedule Fix -->
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,700;1,6..72,400&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
</head>

<body class="overflow-x-hidden">
    <div id="app">
        <div class="relative min-h-screen flex flex-col pt-20 px-6">
            <div class="absolute inset-0 z-0 bg-cover bg-center opacity-40 faded-bg pointer-events-none hero-zoom-crop"
                style="background-image: url('/hero_reconecta_v3.png'); -webkit-user-select: none; user-select: none;">
            </div>

            <header
                class="fixed top-0 w-full z-50 px-6 py-4 flex justify-between items-center backdrop-blur-md border-b border-white/10 bg-black/10">
                <a href="/" class="flex items-center gap-2 text-white no-underline">
                    <span class="material-symbols-outlined">arrow_back</span>
                    <span class="font-display italic text-xl">Volver</span>
                </a>
                <button id="menu-btn"
                    class="bg-white/5 hover:bg-white/10 p-2 rounded-full border border-white/10 transition-colors">
                    <span class="material-symbols-outlined text-white">menu</span>
                </button>
            </header>

            <!-- Navigation Menu Overlay -->
            <div id="nav-menu" class="backdrop-blur-3xl bg-black/60">
                <div class="absolute inset-0 z-0 bg-cover bg-center opacity-10 pointer-events-none hero-zoom-crop"
                    style="background-image: url('/hero_reconecta_v3.png'); -webkit-user-select: none; user-select: none;">
                </div>
                <div class="relative z-10 h-full flex flex-col p-8">
                    <header class="flex justify-between items-center mb-16">
                        <div class="flex items-center gap-2">
                            <span class="material-symbols-outlined text-primary text-3xl">eco</span>
                            <span
                                class="font-display italic text-2xl font-bold tracking-tight text-white">Reconecta</span>
                        </div>
                        <button id="close-menu"
                            class="bg-white/5 hover:bg-white/10 p-2 rounded-full border border-white/10 transition-colors">
                            <span class="material-symbols-outlined text-white">close</span>
                        </button>
                    </header>
                    <nav class="flex flex-col gap-6">
                        <a href="/" class="menu-link animate-fade-in" style="animation-delay: 0.1s;">Inicio</a>
                        <a href="/services.html" class="menu-link animate-fade-in"
                            style="animation-delay: 0.2s;">Servicios</a>
                        <a href="/metodo.html" class="menu-link animate-fade-in"
                            style="animation-delay: 0.3s;">Método</a>
                        <a href="/faq.html" class="menu-link animate-fade-in" style="animation-delay: 0.4s;">Preguntas
                            Frecuentes</a>
                        <a href="/booking.html" class="menu-link active animate-fade-in"
                            style="animation-delay: 0.5s;">Reservar Sesión</a>
                        <a href="/cancel.html" class="menu-link animate-fade-in"
                            style="animation-delay: 0.6s;">Gestionar mi Cita</a>
                    </nav>
                </div>
            </div>

            <main class="relative z-10 max-w-xl mx-auto w-full pt-6 md:pt-10 pb-20">
                <div class="glass-panel rounded-[2rem] p-4 md:p-8">
                    <h1 class="font-display italic text-3xl md:text-4xl text-white mb-2 text-center md:text-left">Elige
                        tu momento</h1>
                    <p class="text-slate-400 text-[10px] md:text-sm mb-6 md:mb-8 text-center md:text-left">
                        Disponibilidad de Lunes a Viernes (9:00 AM - 6:00 PM)</p>

                    <!-- Date Selection -->
                    <div class="mb-8">
                        <div class="flex justify-between items-center mb-4">
                            <label class="text-primary text-[10px] uppercase font-bold tracking-widest"
                                id="current-month-year">Cargando...</label>
                            <div class="flex gap-2">
                                <button id="prev-month" class="text-white hover:text-primary transition-colors">
                                    <span class="material-symbols-outlined text-sm">chevron_left</span>
                                </button>
                                <button id="next-month" class="text-white hover:text-primary transition-colors">
                                    <span class="material-symbols-outlined text-sm">chevron_right</span>
                                </button>
                            </div>
                        </div>

                        <!-- Calendar Grid -->
                        <div class="grid grid-cols-7 gap-px sm:gap-1 text-center mb-2">
                            <span class="text-[9px] sm:text-[10px] text-slate-300 font-bold">LU</span>
                            <span class="text-[9px] sm:text-[10px] text-slate-300 font-bold">MA</span>
                            <span class="text-[9px] sm:text-[10px] text-slate-300 font-bold">MI</span>
                            <span class="text-[9px] sm:text-[10px] text-slate-300 font-bold">JU</span>
                            <span class="text-[9px] sm:text-[10px] text-slate-300 font-bold">VI</span>
                            <span class="text-[9px] sm:text-[10px] text-slate-500 font-bold opacity-40">SA</span>
                            <span class="text-[9px] sm:text-[10px] text-slate-500 font-bold opacity-40">DO</span>
                        </div>
                        <div class="grid grid-cols-7 gap-px sm:gap-1" id="calendar-grid">
                            <!-- Days will be injected by JS -->
                        </div>
                    </div>

                    <!-- Time Slots -->
                    <div class="mb-10">
                        <label class="text-primary text-[10px] uppercase font-bold tracking-widest mb-4 block">Horarios
                            Disponibles</label>
                        <div class="grid grid-cols-2 gap-3" id="time-slots-container">
                            <button
                                class="time-slot glass-panel py-4 rounded-2xl text-sm font-semibold hover:bg-white/20 transition-all">09:00
                                AM</button>
                            <button
                                class="time-slot glass-panel py-4 rounded-2xl text-sm font-semibold hover:bg-white/20 transition-all">10:00
                                AM</button>
                            <button
                                class="time-slot glass-panel py-4 rounded-2xl text-sm font-semibold hover:bg-white/20 transition-all">11:00
                                AM</button>
                            <button
                                class="time-slot glass-panel py-4 rounded-2xl text-sm font-semibold hover:bg-white/20 transition-all">12:00
                                PM</button>
                            <button
                                class="time-slot glass-panel py-4 rounded-2xl text-sm font-semibold hover:bg-white/20 transition-all">01:00
                                PM</button>
                            <button
                                class="time-slot glass-panel py-4 rounded-2xl text-sm font-semibold hover:bg-white/20 transition-all">02:00
                                PM</button>
                            <button
                                class="time-slot glass-panel py-4 rounded-2xl text-sm font-semibold hover:bg-white/20 transition-all">03:00
                                PM</button>
                            <button
                                class="time-slot glass-panel py-4 rounded-2xl text-sm font-semibold hover:bg-white/20 transition-all">04:00
                                PM</button>
                            <button
                                class="time-slot glass-panel py-4 rounded-2xl text-sm font-semibold hover:bg-white/20 transition-all">05:00
                                PM</button>
                        </div>
                    </div>

                    <!-- Personal Data Form -->
                    <div class="mb-10">
                        <label class="text-primary text-[10px] uppercase font-bold tracking-widest mb-4 block">Tus Datos
                            Personales</label>
                        <div class="space-y-4">
                            <div class="relative">
                                <span
                                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm">person</span>
                                <input type="text" placeholder="Nombre completo" id="user-name" required
                                    class="w-full glass-panel bg-white/5 border-white/10 rounded-2xl py-4 pl-12 pr-4 text-sm focus:outline-none focus:border-primary/50 transition-colors placeholder:text-slate-600">
                            </div>
                            <div class="relative">
                                <span
                                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm">mail</span>
                                <input type="email" placeholder="Correo electrónico" id="user-email" required
                                    class="w-full glass-panel bg-white/5 border-white/10 rounded-2xl py-4 pl-12 pr-4 text-sm focus:outline-none focus:border-primary/50 transition-colors placeholder:text-slate-600">
                            </div>
                            <div class="relative">
                                <span
                                    class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm">call</span>
                                <input type="tel" placeholder="Teléfono de contacto" id="user-phone" required
                                    class="w-full glass-panel bg-white/5 border-white/10 rounded-2xl py-4 pl-12 pr-4 text-sm focus:outline-none focus:border-primary/50 transition-colors placeholder:text-slate-600">
                            </div>
                        </div>
                        <p id="error-message" class="text-red-400 text-[10px] mt-4 hidden">Por favor completa todos los
                            campos para agendar tu cita.</p>
                    </div>

                    <button id="confirm-booking"
                        class="w-full block bg-primary hover:bg-[#d4a00a] text-[#0a1f1f] py-4 md:py-5 rounded-2xl font-bold text-base md:text-lg transition-all shadow-lg shadow-primary/20">
                        Confirmar Cita
                    </button>
                </div>
            </main>
        </div>
    </div>
    <script type="module" src="/src/main.js"></script>
    <style>
        @keyframes pulse-gold {
            0% {
                box-shadow: 0 0 0 0 rgba(212, 160, 10, 0.4);
            }

            70% {
                box-shadow: 0 0 0 8px rgba(212, 160, 10, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(212, 160, 10, 0);
            }
        }

        .focus-ring {
            animation: pulse-gold 2s infinite;
            border: 2px solid rgba(212, 160, 10, 0.8);
        }
    </style>
    <script type="module" src="/src/booking.js"></script>
</body>

</html>
