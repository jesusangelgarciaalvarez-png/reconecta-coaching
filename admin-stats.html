<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas | Reconecta Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,700;1,6..72,400&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/src/index.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .table-container {
            overflow-x: auto;
            border-radius: 2rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 1.5rem;
            color: var(--primary);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        td {
            padding: 1.5rem;
            color: white;
            font-size: 0.875rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.5rem;
            border-radius: 1rem;
        }
    </style>
</head>

<body class="overflow-x-hidden bg-[#050f0f]">
    <div id="app">
        <header
            class="fixed top-0 w-full z-50 px-6 py-4 flex justify-between items-center backdrop-blur-md border-b border-white/10 bg-black/10">
            <a href="/admin.html" class="flex items-center gap-2 text-white no-underline">
                <span class="material-symbols-outlined">arrow_back</span>
                <span class="font-display italic text-xl">Volver al Panel</span>
            </a>
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary text-2xl">analytics</span>
                <span class="font-display italic text-xl font-bold text-white">Dashboard de Impacto</span>
            </div>
        </header>

        <main class="relative z-10 min-h-screen pt-32 pb-20 px-6">
            <div class="max-w-6xl mx-auto">

                <!-- Performance Overview -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                    <div class="glass-panel p-6 rounded-3xl border-white/10 flex flex-col items-center text-center">
                        <span class="text-primary text-[10px] uppercase font-bold tracking-widest mb-2">Visitas
                            Hoy</span>
                        <div id="count-today" class="text-4xl font-display text-white mb-1">0</div>
                        <p class="text-slate-500 text-xs">Impacto proyectado</p>
                    </div>
                    <div class="glass-panel p-6 rounded-3xl border-white/10 flex flex-col items-center text-center">
                        <span class="text-primary text-[10px] uppercase font-bold tracking-widest mb-2">Visitas
                            Mes</span>
                        <div id="count-month" class="text-4xl font-display text-white mb-1">0</div>
                        <p class="text-slate-500 text-xs">Crecimiento orgánico</p>
                    </div>
                    <div class="glass-panel p-6 rounded-3xl border-white/10 flex flex-col items-center text-center">
                        <span class="text-primary text-[10px] uppercase font-bold tracking-widest mb-2">Total
                            Histórico</span>
                        <div id="count-total" class="text-4xl font-display text-white mb-1">0</div>
                        <p class="text-slate-500 text-xs">Vidas alcanzadas</p>
                    </div>
                </div>

                <!-- Charts Section -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
                    <!-- Visits by Day Chart -->
                    <div class="glass-panel p-8 rounded-[2.5rem] border-white/10">
                        <h2 class="font-display italic text-2xl text-white mb-8">Fluidez de Visitas (Día/Mes)</h2>
                        <div class="h-64">
                            <canvas id="visits-chart"></canvas>
                        </div>
                    </div>

                    <!-- Top Visitors Chart -->
                    <div class="glass-panel p-8 rounded-[2.5rem] border-white/10">
                        <h2 class="font-display italic text-2xl text-white mb-8">Compromiso por Persona</h2>
                        <div class="h-64">
                            <canvas id="visitors-chart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Detailed Table -->
                <div class="glass-panel p-8 rounded-[2.5rem] border-white/10">
                    <h2 class="font-display italic text-2xl text-white mb-8">Registro Detallado</h2>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Persona</th>
                                    <th>Página</th>
                                    <th>Fecha</th>
                                    <th>Hora</th>
                                </tr>
                            </thead>
                            <tbody id="visits-table-body">
                                <!-- Data injected here -->
                                <tr>
                                    <td colspan="4" class="text-center text-slate-500 py-12">Cargando datos...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        const PROJECT_ID = "reconecta-ed650";
        const API_KEY = "AIzaSyAP36MKFxUd37pxaSdsJzBvXmdK7wV1XZM";

        document.addEventListener('DOMContentLoaded', () => {
            // Check auth
            if (sessionStorage.getItem('reconecta_admin_auth') !== 'true') {
                window.location.href = '/admin.html';
                return;
            }

            loadStats();
        });

        async function loadStats() {
            try {
                // Fetch visits from Firestore
                const url = `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/visits?pageSize=1000&key=${API_KEY}`;
                const response = await fetch(url);
                const data = await response.json();

                if (!data.documents) {
                    showEmpty();
                    return;
                }

                const visits = data.documents.map(doc => {
                    const fields = doc.fields;
                    return {
                        visitorId: fields.visitorId?.stringValue,
                        name: fields.name?.stringValue || 'Anónimo',
                        path: fields.path?.stringValue || '/',
                        timestamp: parseInt(fields.timestamp?.integerValue) || 0,
                        date: fields.date?.stringValue,
                        month: fields.month?.stringValue
                    };
                }).sort((a, b) => b.timestamp - a.timestamp);

                renderDashboard(visits);
            } catch (err) {
                console.error('Error loading stats:', err);
            }
        }

        function renderDashboard(visits) {
            const today = new Date().toISOString().split('T')[0];
            const thisMonth = today.substring(0, 7);

            // 1. High-level counts
            const todayVisits = visits.filter(v => v.date === today).length;
            const monthVisits = visits.filter(v => v.month === thisMonth).length;

            document.getElementById('count-today').textContent = todayVisits;
            document.getElementById('count-month').textContent = monthVisits;
            document.getElementById('count-total').textContent = visits.length;

            // 2. Visits Chart (By Day for the last 14 days)
            const dailyCounts = {};
            const last14Days = [];
            for (let i = 13; i >= 0; i--) {
                const d = new Date();
                d.setDate(d.getDate() - i);
                const dStr = d.toISOString().split('T')[0];
                last14Days.push(dStr);
                dailyCounts[dStr] = 0;
            }

            visits.forEach(v => {
                if (dailyCounts[v.date] !== undefined) dailyCounts[v.date]++;
            });

            const visitsCtx = document.getElementById('visits-chart').getContext('2d');
            new Chart(visitsCtx, {
                type: 'line',
                data: {
                    labels: last14Days.map(d => d.split('-').slice(1).reverse().join('/')),
                    datasets: [{
                        label: 'Visitas',
                        data: last14Days.map(d => dailyCounts[d]),
                        borderColor: '#ecb613',
                        backgroundColor: 'rgba(236, 182, 19, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } },
                        x: { grid: { display: false } }
                    }
                }
            });

            // 3. Top Visitors Chart
            const visitorEngagement = {};
            visits.forEach(v => {
                const key = v.name !== 'Anónimo' ? v.name : `Anónimo (${v.visitorId.substring(0, 6)})`;
                visitorEngagement[key] = (visitorEngagement[key] || 0) + 1;
            });

            const topVisitors = Object.entries(visitorEngagement)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 8);

            const visitorsCtx = document.getElementById('visitors-chart').getContext('2d');
            new Chart(visitorsCtx, {
                type: 'bar',
                data: {
                    labels: topVisitors.map(v => v[0]),
                    datasets: [{
                        label: 'Visitas',
                        data: topVisitors.map(v => v[1]),
                        backgroundColor: '#ef4444',
                        borderRadius: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    indexAxis: 'y',
                    scales: {
                        x: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' } },
                        y: { grid: { display: false } }
                    }
                }
            });

            // 4. Detailed Table
            const tableBody = document.getElementById('visits-table-body');
            tableBody.innerHTML = '';

            visits.slice(0, 50).forEach(v => {
                const dateObj = new Date(v.timestamp);
                const timeStr = dateObj.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
                const dateStr = dateObj.toLocaleDateString('es-MX', { day: '2-digit', month: 'short' });

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="font-bold">${v.name}</td>
                    <td class="text-slate-400 text-xs">${v.path}</td>
                    <td>${dateStr}</td>
                    <td>${timeStr}</td>
                `;
                tableBody.appendChild(tr);
            });
        }

        function showEmpty() {
            document.getElementById('visits-table-body').innerHTML = '<tr><td colspan="4" class="text-center text-slate-500 py-12">No hay datos de visitas registrados aún.</td></tr>';
        }
    </script>
</body>

</html>
