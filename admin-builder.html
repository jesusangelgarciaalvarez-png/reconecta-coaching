<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Builder | PortalCoach Admin</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,700;1,6..72,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&family=Manrope:wght@300;400;600&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#fbbf24', dark: '#030712' },
                    fontFamily: { display: ['Newsreader', 'serif'], sans: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bg-mesh {
            background-color: #030712;
            background-image: radial-gradient(at 0% 0%, rgba(251, 191, 36, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.05) 0px, transparent 50%);
        }

        .section-tab.active {
            color: #fbbf24;
            border-bottom: 2px solid #fbbf24;
        }
    </style>
</head>

<body class="bg-mesh text-slate-200 min-h-screen font-sans">
    <header
        class="fixed top-0 w-full z-50 px-8 py-6 backdrop-blur-xl border-b border-white/5 bg-black/20 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <button onclick="history.back()"
                class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10 transition-all">
                <span class="material-symbols-outlined text-sm">arrow_back</span>
            </button>
            <div class="flex flex-col">
                <h1 class="font-display italic text-2xl font-bold text-white leading-none">Website Builder</h1>
                <span class="text-[10px] text-primary uppercase font-bold tracking-widest mt-1">SaaS White-Label
                    v51.0 GOLDEN EDITION</span>
            </div>
        </div>
        <div class="flex gap-4">
            <div class="flex flex-col items-end">
                <span class="text-[10px] text-slate-500 uppercase font-black tracking-widest">Subdominio Activo</span>
                <span id="display-subdomain" class="text-primary font-bold text-sm">cargando...</span>
            </div>
            <button id="magic-fill"
                class="bg-white/5 border border-white/10 text-white px-6 py-2 rounded-xl font-bold text-sm hover:bg-white/10 transition-all flex items-center gap-2 group">
                <span
                    class="material-symbols-outlined text-sm group-hover:rotate-12 transition-transform">magic_button</span>
                ESTRUCTURA MÁGICA
            </button>
            <button id="save-all"
                class="bg-primary text-dark px-6 py-2 rounded-xl font-bold text-sm hover:scale-105 transition-all flex items-center gap-2">
                <span class="material-symbols-outlined text-sm">save</span> PUBLICAR SITIO
            </button>
        </div>
    </header>

    <main class="pt-32 pb-20 px-6 max-w-5xl mx-auto">
        <!-- Visual Config -->
        <section class="glass-card p-10 rounded-[3rem] mb-12">
            <h2 class="font-display italic text-3xl text-white mb-8 text-center">Identidad Visual</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="flex flex-col p-6 bg-white/5 rounded-2xl border border-white/10">
                    <label class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mb-3 block">Tipografía
                        Premium</label>
                    <select id="main-font"
                        class="bg-transparent border-none text-sm focus:outline-none cursor-pointer w-full appearance-none">
                        <option value="Outfit">Outfit (Moderna/SaaS)</option>
                        <option value="Newsreader">Newsreader (Editorial/Elegante)</option>
                        <option value="Playfair Display">Playfair Display (Lujo/Destacado)</option>
                        <option value="Inter">Inter (Limpio/Minimal)</option>
                    </select>
                    <div id="font-preview"
                        class="mt-4 p-4 border border-white/5 bg-white/5 rounded-xl text-center text-lg">
                        Previsualización de Texto
                    </div>
                </div>
                <div
                    class="flex items-center justify-center p-6 bg-white/5 rounded-2xl border border-white/10 text-center">
                    <div class="opacity-40">
                        <span class="material-symbols-outlined text-3xl mb-1">palette</span>
                        <p class="text-[9px] uppercase tracking-widest font-bold">Color sincronizado con el Dashboard
                        </p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Pages Setup -->
        <div class="flex gap-8 mb-8 border-b border-white/10 overflow-x-auto pb-px">
            <button class="section-tab active px-4 py-2 text-sm font-bold uppercase tracking-widest transition-all"
                data-page="inicio">Inicio</button>
            <button class="section-tab px-4 py-2 text-sm font-bold uppercase tracking-widest transition-all"
                data-page="mision">Misión</button>
            <button class="section-tab px-4 py-2 text-sm font-bold uppercase tracking-widest transition-all"
                data-page="servicios">Servicios</button>
            <button
                class="section-tab px-4 py-2 text-sm font-bold uppercase tracking-widest transition-all hover:bg-white/5 rounded-xl border border-white/5"
                data-page="metodo">Método</button>
            <button
                class="section-tab px-4 py-2 text-sm font-bold uppercase tracking-widest transition-all hover:bg-white/5 rounded-xl border border-white/5"
                data-page="pie_pagina">Pie de Página</button>
        </div>

        <div id="sections-container" class="space-y-8">
            <!-- Sections will be injected here -->
        </div>
    </main>

    <template id="section-template">
        <div class="glass-card p-8 rounded-[2.5rem] relative group border-white/10 hover:border-white/20">
            <div class="flex justify-between items-start mb-6">
                <div class="flex gap-4 items-center">
                    <select
                        class="section-type bg-white/5 border border-white/10 rounded-lg px-3 py-1 text-xs text-primary focus:outline-none">
                        <option value="hero">Hero / Principal</option>
                        <option value="hero_home">Encabezado (Titulo/Sub/Tag)</option>
                        <option value="caracteristica_home">Característica (Cuadro)</option>
                        <option value="tarjeta_servicio">Tarjeta de Servicio</option>
                        <option value="paso">Paso del Método</option>
                        <option value="texto_simple">Texto Simple</option>
                    </select>
                </div>
                <button
                    class="remove-section opacity-0 group-hover:opacity-100 text-slate-600 hover:text-red-400 transition-all">
                    <span class="material-symbols-outlined text-sm">delete</span>
                </button>
            </div>
            <div class="space-y-4">
                <input type="text"
                    class="section-title w-full bg-white/5 border border-white/10 rounded-xl py-4 px-6 text-lg font-display italic focus:outline-none focus:border-primary transition-all"
                    placeholder="Título de la sección...">
                <div class="relative">
                    <textarea
                        class="section-content w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 text-sm min-h-[120px] focus:outline-none focus:border-primary transition-all"
                        placeholder="Contenido o descripción..."></textarea>

                    <!-- IA Suggestion Overlay (Hidden by Default) -->
                    <div
                        class="ai-suggestion-overlay hidden absolute inset-0 bg-dark/95 backdrop-blur-sm rounded-2xl p-6 flex flex-col justify-between border border-primary/30 z-20 animate-fade-in shadow-2xl">
                        <div class="flex flex-col gap-2">
                            <div class="flex items-center gap-2 text-primary mb-1">
                                <span class="material-symbols-outlined text-sm">auto_awesome</span>
                                <span class="text-[9px] uppercase font-black tracking-widest">Sugerencia de IA</span>
                            </div>
                            <h4 class="suggestion-title text-base font-display italic text-white leading-tight">...</h4>
                            <p
                                class="suggestion-content text-xs text-slate-300 leading-relaxed overflow-y-auto max-h-[80px]">
                                ...</p>
                            <div class="suggestion-kw-box hidden">
                                <span
                                    class="suggestion-keyword text-[9px] bg-primary/10 text-primary px-2 py-0.5 rounded-full font-bold"></span>
                            </div>
                        </div>
                        <div class="flex gap-2 mt-4">
                            <button
                                class="apply-suggestion flex-1 bg-primary text-dark py-2 rounded-lg text-[10px] font-bold uppercase transition-all hover:scale-[1.02]">Aplicar</button>
                            <button
                                class="reject-suggestion flex-1 bg-white/5 text-white py-2 rounded-lg text-[10px] font-bold uppercase border border-white/10 hover:bg-white/10 transition-all">Descartar</button>
                        </div>
                    </div>
                </div>

                <!-- Image Keyword Display (Only for Home Features) -->
                <div class="keyword-container hidden mt-4 flex items-center gap-4 animate-fade-in">
                    <div class="w-16 h-16 rounded-xl overflow-hidden bg-white/5 border border-white/10 flex-shrink-0">
                        <img class="keyword-preview w-full h-full object-cover opacity-60">
                    </div>
                    <div class="flex-1">
                        <div class="flex justify-between items-center mb-1">
                            <label class="text-[9px] text-slate-500 uppercase font-black tracking-widest block">Concepto
                                Visual (IA)</label>
                            <span class="text-[8px] text-primary/60 font-mono italic">unsplash.com</span>
                        </div>
                        <input type="text"
                            class="section-keyword w-full bg-white/5 border border-white/10 rounded-lg py-2 px-4 text-xs focus:outline-none focus:border-primary transition-all"
                            placeholder="Ej: mountain, calm, path...">
                    </div>
                </div>

                <button
                    class="ai-improve absolute bottom-4 right-4 bg-white/10 hover:bg-primary hover:text-dark px-4 py-2 rounded-full text-xs font-bold transition-all flex items-center gap-2">
                    <span class="material-symbols-outlined text-[14px]">auto_awesome</span> MEJORAR CON IA
                </button>
            </div>
        </div>
        </div>
    </template>

    <div id="toast"
        class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-primary text-dark py-4 px-8 rounded-2xl font-bold hidden z-[100] shadow-2xl">
        ¡Cambios guardados con éxito! ✨
    </div>

    <script type="module">
        import { tenantId } from './src/tenant-resolver.js';

        const container = document.getElementById('sections-container');
        const template = document.getElementById('section-template');
        const tabs = document.querySelectorAll('.section-tab');
        const fontSelect = document.getElementById('main-font');
        const fontPreview = document.getElementById('font-preview');

        document.getElementById('display-subdomain').textContent = `${tenantId}.portalcoach.com`;

        let currentState = {
            inicio: { secciones: [] },
            pie_pagina: { secciones: [] },
            mision: { secciones: [] },
            servicios: { secciones: [] },
            metodo: { secciones: [] }
        };
        let activePage = 'inicio';

        const MAGIC_TEMPLATES = {
            inicio: {
                secciones: [
                    { id: 100, tipo: 'hero_home', titulo: 'Conecta contigo.', contenido: 'Acompañamiento personalizado para tu bienestar integral.', image_keyword: 'transformación' }
                ]
            },
            pie_pagina: {
                secciones: [
                    { id: 101, tipo: 'caracteristica_home', titulo: 'Resiliencia', contenido: 'Herramientas prácticas para navegar los desafíos diarios con fortaleza interna y calma.', image_keyword: 'resilience' },
                    { id: 102, tipo: 'caracteristica_home', titulo: 'Claridad Mental', contenido: 'Libera el ruido mental y encuentra el enfoque necesario para tomar las mejores decisiones.', image_keyword: 'clarity' },
                    { id: 103, tipo: 'caracteristica_home', titulo: 'Atención Plena', contenido: 'Prácticas de meditación y presencia para reducir el ruido mental y conectar con el presente.', image_keyword: 'meditation' },
                    { id: 104, tipo: 'caracteristica_home', titulo: 'Autoestima', contenido: 'Un viaje profundo para redescubrir tu valor y hablarte con la compasión que mereces.', image_keyword: 'self-love' }
                ]
            },
            mision: {
                secciones: [
                    { id: 1, tipo: 'hero', titulo: 'Reconecta con tu esencia y vive con propósito', contenido: 'Acompaño a personas en procesos de cambio para que recuperen su seguridad, sanen sus vínculos y construyan una vida alineada con sus valores más profundos.' },
                    { id: 2, tipo: 'texto_simple', titulo: 'Mi Transformación Personal', contenido: 'Después de años de búsqueda, descubrí que la paz no es la ausencia de conflictos, sino la capacidad de habitarlos con consciencia. Hoy, mi misión es guiarte en ese mismo camino.' },
                    { id: 3, tipo: 'tarjeta_servicio', titulo: 'Espacio Seguro', contenido: 'Un entorno libre de juicios donde cada palabra cuenta y cada silencio es una oportunidad para el autoconocimiento.' },
                    { id: 4, tipo: 'texto_simple', titulo: '¿Por qué trabajar conmigo?', contenido: 'Porque entiendo que el crecimiento no es lineal y que cada proceso es único. Mi enfoque combina la empatía profunda con herramientas prácticas de acción.' }
                ]
            },
            servicios: {
                secciones: [
                    { id: 5, tipo: 'tarjeta_servicio', titulo: 'Coaching de Vida', contenido: 'Desbloquea los patrones que te detienen y diseña un plan de vida que te entusiasme cada mañana.' },
                    { id: 6, tipo: 'tarjeta_servicio', titulo: 'Gestión Emocional', contenido: 'Aprende a navegar tus emociones sin que ellas te dominen, recuperando el equilibrio y la calma.' },
                    { id: 7, tipo: 'tarjeta_servicio', titulo: 'Relaciones Conscientes', contenido: 'Sana tus vínculos y aprende a establecer límites saludables que fortalezcan tu autoestima.' },
                    { id: 8, tipo: 'tarjeta_servicio', titulo: 'Mentoría de Propósito', contenido: 'Encuentra claridad sobre tu camino profesional y personal alineando tus talentos con tu misión.' }
                ]
            },
            metodo: {
                secciones: [
                    { id: 9, tipo: 'paso', titulo: 'Claridad Inicial', contenido: 'Identificamos los bloqueos invisibles que están frenando tu crecimiento y definimos el norte de tu transformación.' },
                    { id: 10, tipo: 'paso', titulo: 'Desprogramación', contenido: 'Cuestionamos las creencias limitantes que has heredado para dar espacio a una nueva narrativa personal.' },
                    { id: 11, tipo: 'paso', titulo: 'Integración', contenido: 'Practicamos herramientas de presencia y gestión que puedes aplicar desde el primer día en tu vida cotidiana.' },
                    { id: 12, tipo: 'paso', titulo: 'Poder Personal', contenido: 'Consolidamos tu nueva identidad, permitiéndote tomar decisiones desde la seguridad y no desde el miedo.' }
                ]
            }
        };

        // --- NEW: PERSISTENCE LOGIC ---
        function saveToLocal() {
            const dataToSave = {
                paginas: currentState,
                configuracion_visual: { tipografia: fontSelect.value },
                timestamp: Date.now()
            };
            localStorage.setItem(`builder_draft_${tenantId}`, JSON.stringify(dataToSave));
            console.log("Draft saved locally");
        }

        function loadFromLocal() {
            const saved = localStorage.getItem(`builder_draft_${tenantId}`);
            if (saved) {
                return JSON.parse(saved);
            }
            return null;
        }
        // ------------------------------

        async function loadInitialData() {
            const localDraft = loadFromLocal();

            try {
                const res = await fetch(`/api/sitios?subdominio=${tenantId}`);
                if (res.ok) {
                    const onlineData = await res.json();

                    // If local draft is newer or online is empty, use draft? 
                    // For now, prioritize online but if draft exists, maybe merge or warn.
                    // Simple approach: Use online, but if online fails, use draft.
                    if (onlineData.paginas) currentState = onlineData.paginas;
                    if (onlineData.configuracion_visual) {
                        fontSelect.value = onlineData.configuracion_visual.tipografia || 'Outfit';
                    }
                }
            } catch (e) {
                console.log("Offline or no data, checking draft:", e);
                if (localDraft) {
                    currentState = localDraft.paginas;
                    fontSelect.value = localDraft.configuracion_visual?.tipografia || 'Outfit';
                }
            }

            // If local draft exists and is present, prioritize it for "unsaved work"
            if (localDraft && localDraft.paginas) {
                currentState = localDraft.paginas;
                fontSelect.value = localDraft.configuracion_visual?.tipografia || 'Outfit';
            }

            updateFontPreview();
            renderSections();
        }

        function updateFontPreview() {
            fontPreview.style.fontFamily = `'${fontSelect.value}', sans-serif`;
            saveToLocal();
        }
        fontSelect.onchange = updateFontPreview;

        function renderSections() {
            container.innerHTML = '';
            const sections = currentState[activePage].secciones;

            sections.forEach((sec, idx) => {
                const clone = template.content.cloneNode(true);
                const card = clone.querySelector('.glass-card');

                card.querySelector('.section-type').value = sec.tipo;
                card.querySelector('.section-title').value = sec.titulo;
                card.querySelector('.section-content').value = sec.contenido;

                card.querySelector('.section-type').onchange = (e) => { sec.tipo = e.target.value; saveToLocal(); };
                card.querySelector('.section-title').oninput = (e) => {
                    sec.titulo = e.target.value;
                    if (sec.tipo === 'caracteristica_home' && sec.titulo.split(/\s+/).filter(w => w.length > 0).length > 3) {
                        e.target.classList.add('border-red-500/50');
                    } else {
                        e.target.classList.remove('border-red-500/50');
                    }
                    saveToLocal();
                };
                card.querySelector('.section-content').oninput = (e) => { sec.contenido = e.target.value; saveToLocal(); };

                // --- NEW: Keyword Handling ---
                const kwContainer = card.querySelector('.keyword-container');
                if (sec.tipo === 'caracteristica_home') {
                    kwContainer.classList.remove('hidden');
                    const kwInput = card.querySelector('.section-keyword');
                    const kwPreview = card.querySelector('.keyword-preview');

                    kwInput.value = sec.image_keyword || '';
                    if (sec.image_keyword) {
                        kwPreview.src = `https://source.unsplash.com/featured/?${sec.image_keyword}`;
                    }

                    kwInput.onchange = (e) => {
                        sec.image_keyword = e.target.value;
                        kwPreview.src = `https://source.unsplash.com/featured/?${sec.image_keyword}`;
                        saveToLocal();
                    };
                }

                card.querySelector('.remove-section').onclick = () => {
                    currentState[activePage].secciones.splice(idx, 1);
                    saveToLocal();
                    renderSections();
                };

                card.querySelector('.ai-improve').onclick = async () => {
                    const btn = card.querySelector('.ai-improve');
                    const overlay = card.querySelector('.ai-suggestion-overlay');
                    const originalText = btn.innerHTML;

                    btn.disabled = true;
                    btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[14px]">sync</span> GENERANDO...';

                    try {
                        const res = await fetch('/api/generar-texto', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                pagina: activePage,
                                tipo_seccion: sec.tipo,
                                ideas_previas: card.querySelector('.section-content').value || sec.contenido
                            })
                        });

                        console.log("AI Response Status:", res.status);
                        const data = await res.json();
                        console.log("AI Data Received:", data);

                        if (data.titulo && data.contenido) {
                            overlay.querySelector('.suggestion-title').textContent = data.titulo;
                            overlay.querySelector('.suggestion-content').textContent = data.contenido;

                            if (data.image_keyword) {
                                const kwBox = overlay.querySelector('.suggestion-kw-box');
                                if (kwBox) {
                                    kwBox.classList.remove('hidden');
                                    kwBox.querySelector('.suggestion-keyword').textContent = data.image_keyword;
                                }
                            }

                            overlay.classList.remove('hidden');

                            overlay.querySelector('.apply-suggestion').onclick = () => {
                                card.querySelector('.section-title').value = data.titulo;
                                card.querySelector('.section-content').value = data.contenido;
                                sec.titulo = data.titulo;
                                sec.contenido = data.contenido;

                                if (data.image_keyword) {
                                    sec.image_keyword = data.image_keyword;
                                    const kwInput = card.querySelector('.section-keyword');
                                    const kwPreview = card.querySelector('.keyword-preview');
                                    if (kwInput) kwInput.value = data.image_keyword;
                                    if (kwPreview) kwPreview.src = `https://loremflickr.com/400/300/${data.image_keyword},coaching?lock=preview`;
                                }

                                overlay.classList.add('hidden');
                                saveToLocal();
                            };

                            overlay.querySelector('.reject-suggestion').onclick = () => {
                                overlay.classList.add('hidden');
                            };
                        } else {
                            console.error("AI did not return expected fields:", data);
                            alert("La IA devolvió un formato inesperado. Intenta de nuevo.");
                        }
                    } catch (e) {
                        console.error("AI Error:", e);
                        alert("Error de IA: " + e.message);
                    } finally {
                        btn.disabled = false;
                        btn.innerHTML = originalText;
                    }
                };

                container.appendChild(clone);
            });

            if (sections.length < 4) {
                const addBtn = document.createElement('button');
                addBtn.className = 'w-full py-8 border-2 border-dashed border-white/10 rounded-[2.5rem] text-slate-500 hover:border-primary hover:text-primary transition-all flex flex-col items-center justify-center gap-2';
                addBtn.innerHTML = '<span class="material-symbols-outlined text-3xl">add_circle</span><span class="text-xs font-bold uppercase tracking-widest">Nueva Sección</span>';
                addBtn.onclick = () => {
                    currentState[activePage].secciones.push({
                        id: Date.now(),
                        tipo: 'hero',
                        titulo: '',
                        contenido: ''
                    });
                    saveToLocal();
                    renderSections();
                };
                container.appendChild(addBtn);
            }
        }

        tabs.forEach(tab => {
            tab.onclick = () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                activePage = tab.dataset.page;
                renderSections();
            };
        });

        document.getElementById('save-all').onclick = async () => {
            const btn = document.getElementById('save-all');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-sm">sync</span> PUBLICANDO...';

            const finalData = {
                subdominio: tenantId,
                configuracion_visual: {
                    tipografia: fontSelect.value,
                },
                paginas: currentState
            };

            console.log("Publishing data:", finalData);

            try {
                // Corrected API endpoint for PUT/PATCH based on handler logic
                const res = await fetch(`/api/sitios?subdominio=${tenantId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(finalData)
                });

                if (res.ok) {
                    const toast = document.getElementById('toast');
                    toast.classList.remove('hidden');
                    localStorage.removeItem(`builder_draft_${tenantId}`); // Clear draft on successful publish
                    console.log("Publish successful, draft cleared.");
                    setTimeout(() => toast.classList.add('hidden'), 3000);
                } else {
                    const errData = await res.json();
                    console.error("Server Error:", errData);
                    alert("Error del servidor: " + (errData.message || "Fallo desconocido"));
                }
            } catch (e) {
                console.error("Fetch Error:", e);
                alert("Error de conexión al publicar: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        };

        document.getElementById('magic-fill').onclick = () => {
            const hasExistingContent = Object.values(currentState).some(p =>
                p.secciones && p.secciones.some(s => s.titulo.trim() || s.contenido.trim())
            );

            const warning = "La información actual será reemplazada totalmente, ¿estás de acuerdo?";

            if (!hasExistingContent || confirm(warning)) {
                currentState = JSON.parse(JSON.stringify(MAGIC_TEMPLATES));
                saveToLocal();
                renderSections();
                const toast = document.getElementById('toast');
                toast.textContent = "¡Estructura mágica aplicada! ✨";
                toast.classList.remove('hidden');
                setTimeout(() => {
                    toast.classList.add('hidden');
                    toast.textContent = "¡Cambios guardados con éxito! ✨";
                }, 3000);
            }
        };

        loadInitialData();
        updateFontPreview();
    </script>
</body>

</html>
