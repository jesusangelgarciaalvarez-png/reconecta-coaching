<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Builder | PortalCoach Admin</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,700;1,6..72,400&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#fbbf24', dark: '#030712' },
                    fontFamily: { display: ['Newsreader', 'serif'], sans: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bg-mesh {
            background-color: #030712;
            background-image: radial-gradient(at 0% 0%, rgba(251, 191, 36, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.05) 0px, transparent 50%);
        }

        .section-tab.active {
            color: #fbbf24;
            border-bottom: 2px solid #fbbf24;
        }
    </style>
</head>

<body class="bg-mesh text-slate-200 min-h-screen font-sans">
    <header
        class="fixed top-0 w-full z-50 px-8 py-6 backdrop-blur-xl border-b border-white/5 bg-black/20 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <button onclick="history.back()"
                class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10 transition-all">
                <span class="material-symbols-outlined text-sm">arrow_back</span>
            </button>
            <div class="flex flex-col">
                <h1 class="font-display italic text-2xl font-bold text-white leading-none">Website Builder</h1>
                <span class="text-[10px] text-primary uppercase font-bold tracking-widest mt-1">SaaS White-Label
                    v1.0</span>
            </div>
        </div>
        <div class="flex gap-4">
            <input type="text" id="subdomain" placeholder="tu-subdominio"
                class="bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-primary w-40">
            <button id="save-all"
                class="bg-primary text-dark px-6 py-2 rounded-xl font-bold text-sm hover:scale-105 transition-all flex items-center gap-2">
                <span class="material-symbols-outlined text-sm">save</span> PUBLICAR SITIO
            </button>
        </div>
    </header>

    <main class="pt-32 pb-20 px-6 max-w-5xl mx-auto">
        <!-- Visual Config -->
        <section class="glass-card p-10 rounded-[3rem] mb-12">
            <h2 class="font-display italic text-3xl text-white mb-8 text-center">Identidad Visual</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="flex items-center justify-between p-6 bg-white/5 rounded-2xl border border-white/10">
                    <div>
                        <label class="text-[10px] text-slate-500 uppercase font-bold tracking-widest block mb-1">Color
                            Principal</label>
                        <p class="text-[9px] text-slate-400 italic">Marca la pauta de tu sitio</p>
                    </div>
                    <input type="color" id="main-color" value="#fbbf24"
                        class="w-12 h-12 bg-transparent border-none cursor-pointer">
                </div>
                <div class="flex flex-col p-6 bg-white/5 rounded-2xl border border-white/10">
                    <label
                        class="text-[10px] text-slate-500 uppercase font-bold tracking-widest mb-3 block">Tipografía</label>
                    <select id="main-font" class="bg-transparent border-none text-sm focus:outline-none cursor-pointer">
                        <option value="Outfit">Outfit (Moderna)</option>
                        <option value="Newsreader">Newsreader (Elegante)</option>
                        <option value="Manrope">Manrope (Limpia)</option>
                    </select>
                </div>
            </div>
        </section>

        <!-- Pages Setup -->
        <div class="flex gap-8 mb-8 border-b border-white/10 overflow-x-auto pb-px">
            <button class="section-tab active px-4 py-2 text-sm font-bold uppercase tracking-widest transition-all"
                data-page="mision">Misión</button>
            <button class="section-tab px-4 py-2 text-sm font-bold uppercase tracking-widest transition-all"
                data-page="servicios">Servicios</button>
            <button class="section-tab px-4 py-2 text-sm font-bold uppercase tracking-widest transition-all"
                data-page="metodo">Método</button>
        </div>

        <div id="sections-container" class="space-y-8">
            <!-- Sections will be injected here -->
        </div>
    </main>

    <template id="section-template">
        <div class="glass-card p-8 rounded-[2.5rem] relative group border-white/10 hover:border-white/20">
            <div class="flex justify-between items-start mb-6">
                <div class="flex gap-4 items-center">
                    <select
                        class="section-type bg-white/5 border border-white/10 rounded-lg px-3 py-1 text-xs text-primary focus:outline-none">
                        <option value="hero">Hero / Principal</option>
                        <option value="tarjeta_servicio">Tarjeta de Servicio</option>
                        <option value="paso">Paso del Método</option>
                        <option value="texto_simple">Texto Simple</option>
                    </select>
                </div>
                <button
                    class="remove-section opacity-0 group-hover:opacity-100 text-slate-600 hover:text-red-400 transition-all">
                    <span class="material-symbols-outlined text-sm">delete</span>
                </button>
            </div>
            <div class="space-y-4">
                <input type="text"
                    class="section-title w-full bg-white/5 border border-white/10 rounded-xl py-4 px-6 text-lg font-display italic focus:outline-none focus:border-primary transition-all"
                    placeholder="Título de la sección...">
                <div class="relative">
                    <textarea
                        class="section-content w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 text-sm min-h-[120px] focus:outline-none focus:border-primary transition-all"
                        placeholder="Contenido o descripción..."></textarea>
                    <button
                        class="ai-improve absolute bottom-4 right-4 bg-white/10 hover:bg-primary hover:text-dark px-4 py-2 rounded-full text-xs font-bold transition-all flex items-center gap-2">
                        <span class="material-symbols-outlined text-[14px]">auto_awesome</span> MEJORAR CON IA
                    </button>
                </div>
            </div>
        </div>
    </template>

    <div id="toast"
        class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-primary text-dark py-4 px-8 rounded-2xl font-bold hidden z-[100] shadow-2xl">
        ¡Cambios guardados con éxito! ✨
    </div>

    <script type="module">
        const container = document.getElementById('sections-container');
        const template = document.getElementById('section-template');
        const tabs = document.querySelectorAll('.section-tab');

        let currentState = {
            mision: { secciones: [] },
            servicios: { secciones: [] },
            metodo: { secciones: [] }
        };
        let activePage = 'mision';

        function renderSections() {
            container.innerHTML = '';
            const sections = currentState[activePage].secciones;

            sections.forEach((sec, idx) => {
                const clone = template.content.cloneNode(true);
                const card = clone.querySelector('.glass-card');

                card.querySelector('.section-type').value = sec.tipo;
                card.querySelector('.section-title').value = sec.titulo;
                card.querySelector('.section-content').value = sec.contenido;

                card.querySelector('.section-type').onchange = (e) => sec.tipo = e.target.value;
                card.querySelector('.section-title').oninput = (e) => sec.titulo = e.target.value;
                card.querySelector('.section-content').oninput = (e) => sec.contenido = e.target.value;

                card.querySelector('.remove-section').onclick = () => {
                    currentState[activePage].secciones.splice(idx, 1);
                    renderSections();
                };

                card.querySelector('.ai-improve').onclick = async () => {
                    const btn = card.querySelector('.ai-improve');
                    const originalText = btn.innerHTML;
                    btn.disabled = true;
                    btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[14px]">sync</span> MEJORANDO...';

                    try {
                        const res = await fetch('/api/generar-texto', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                pagina: activePage,
                                tipo_seccion: sec.tipo,
                                ideas_previas: sec.contenido
                            })
                        });
                        const data = await res.json();
                        if (data.titulo) {
                            card.querySelector('.section-title').value = data.titulo;
                            card.querySelector('.section-content').value = data.contenido;
                            sec.titulo = data.titulo;
                            sec.contenido = data.contenido;
                        }
                    } catch (e) {
                        alert("Error de IA: " + e.message);
                    } finally {
                        btn.disabled = false;
                        btn.innerHTML = originalText;
                    }
                };

                container.appendChild(clone);
            });

            if (sections.length < 4) {
                const addBtn = document.createElement('button');
                addBtn.className = 'w-full py-8 border-2 border-dashed border-white/10 rounded-[2.5rem] text-slate-500 hover:border-primary hover:text-primary transition-all flex flex-col items-center justify-center gap-2';
                addBtn.innerHTML = '<span class="material-symbols-outlined text-3xl">add_circle</span><span class="text-xs font-bold uppercase tracking-widest">Nueva Sección</span>';
                addBtn.onclick = () => {
                    currentState[activePage].secciones.push({
                        id: Date.now(),
                        tipo: 'hero',
                        titulo: '',
                        contenido: ''
                    });
                    renderSections();
                };
                container.appendChild(addBtn);
            }
        }

        tabs.forEach(tab => {
            tab.onclick = () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                activePage = tab.dataset.page;
                renderSections();
            };
        });

        document.getElementById('save-all').onclick = async () => {
            const subdomain = document.getElementById('subdomain').value.trim();
            if (!subdomain) return alert("Ingresa un subdominio");

            const finalData = {
                subdominio: subdomain,
                configuracion_visual: {
                    color_primario: document.getElementById('main-color').value,
                    tipografia: document.getElementById('main-font').value,
                },
                paginas: currentState
            };

            try {
                const res = await fetch(`/api/sitios/${subdomain}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(finalData)
                });
                if (res.ok) {
                    const toast = document.getElementById('toast');
                    toast.classList.remove('hidden');
                    setTimeout(() => toast.classList.add('hidden'), 3000);
                }
            } catch (e) {
                alert("Error al guardar: " + e.message);
            }
        };

        renderSections();
    </script>
</body>

</html>
