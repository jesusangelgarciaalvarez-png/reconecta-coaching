<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Promociones | Reconecta Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,700;1,6..72,400&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/src/index.css">
    <style>
        .month-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .month-card:focus-within {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(var(--primary-rgb), 0.1);
        }

        .promo-input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            resize: none;
            outline: none;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .promo-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body class="overflow-x-hidden bg-[#050f0f]">
    <div id="app">
        <!-- Background Layer Fixed -->
        <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
            <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&q=80&w=2560"
                class="w-full h-full object-cover opacity-20 hero-zoom-crop" alt="Fondo Bosque"
                style="-webkit-user-select: none; user-select: none;">
        </div>

        <header
            class="fixed top-0 w-full z-50 px-6 py-4 flex justify-between items-center backdrop-blur-md border-b border-white/10 bg-black/10">
            <div class="flex items-center gap-4">
                <a href="/admin.html"
                    class="flex items-center gap-2 text-white no-underline hover:text-primary transition-all group">
                    <span
                        class="material-symbols-outlined transition-transform group-hover:-translate-x-1">arrow_back</span>
                    <span class="font-display italic text-xl hidden md:block">Volver</span>
                </a>
                <div class="h-8 w-px bg-white/10 mx-2"></div>
                <div class="flex flex-col">
                    <span class="font-display italic text-xl font-bold text-white leading-none">Promociones</span>
                    <span class="text-[9px] text-primary uppercase font-bold tracking-widest mt-1 opacity-80">Calendario
                        Dinámico</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="generate-btn"
                    class="bg-primary/10 hover:bg-primary/20 text-primary border border-primary/30 px-4 py-2 rounded-xl text-xs font-bold transition-all flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">auto_awesome</span>
                    Generar Creatividad
                </button>
                <button id="save-all-btn"
                    class="bg-primary text-black px-6 py-2 rounded-xl text-xs font-bold hover:scale-105 transition-all shadow-lg shadow-primary/20">
                    Guardar Todo
                </button>
            </div>
        </header>

        <main class="relative z-10 pt-32 pb-20 px-6 max-w-5xl mx-auto">
            <div class="text-center mb-12">
                <h1 class="font-display italic text-4xl text-white mb-4">Promociones Mensuales</h1>
                <p class="text-slate-400 max-w-xl mx-auto text-sm">Define las promociones flash que aparecerán en la
                    web. El sistema sugerirá ideas creativas sin exceder el 25% de descuento.</p>
            </div>

            <div id="promos-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Months will be injected here -->
                <div class="flex items-center justify-center p-20 col-span-full">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
                </div>
            </div>
        </main>

        <div id="toast"
            class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-2xl bg-black/80 backdrop-blur-xl border border-white/10 text-white text-sm font-medium opacity-0 transition-all pointer-events-none translate-y-4">
            Cambios guardados con éxito
        </div>
    </div>

    <script type="module" src="/src/admin-promos.js"></script>
</body>

</html>
