<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Manual | PortalCoach Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,700;1,6..72,400&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/src/index.css">
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 20px 50px 0 rgba(0, 0, 0, 0.6);
        }

        .calendar-day-btn {
            height: 100px;
            padding: 0.5rem;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
        }

        .calendar-day-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .calendar-day-active {
            border-color: #3b82f6 !important;
            background: rgba(59, 130, 246, 0.15) !important;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .slot-btn {
            padding: 1rem;
            border-radius: 1.25rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
            text-align: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .slot-occupied {
            background: rgba(239, 68, 68, 0.15) !important;
            border-color: rgba(239, 68, 68, 0.4);
            color: #f87171;
        }

        .slot-occupied:hover {
            background: rgba(239, 68, 68, 0.25) !important;
        }

        .slot-free {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.3);
            color: #4ade80;
        }

        .slot-free:hover {
            background: rgba(34, 197, 94, 0.2);
            transform: scale(1.02);
        }

        .bg-mesh {
            background-color: #030712;
            background-image: none !important;
            position: relative;
        }

        .bg-dynamic-layer {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-dynamic-layer::before,
        .bg-dynamic-layer::after {
            content: "";
            position: absolute;
            width: 80vw;
            height: 80vw;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.18;
            animation: moveGlow 25s infinite alternate;
        }

        .bg-dynamic-layer::before {
            background: radial-gradient(circle, #3b82f6, transparent);
            top: -20%;
            left: -20%;
        }

        .bg-dynamic-layer::after {
            background: radial-gradient(circle, #fbbf24, transparent);
            bottom: -20%;
            right: -20%;
            animation-duration: 30s;
            animation-delay: -7s;
        }

        @keyframes moveGlow {
            0% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(150px, 100px) scale(1.2);
            }

            100% {
                transform: translate(-100px, 200px) scale(0.9);
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body class="bg-mesh min-h-screen text-slate-200 font-sans selection:bg-primary/30 overflow-x-hidden">
    <!-- Dynamic Background Layer -->
    <div class="bg-dynamic-layer"></div>

    <div id="app">
        <header
            class="fixed top-0 w-full z-50 px-8 py-6 flex justify-between items-center backdrop-blur-xl border-b border-white/5 bg-black/20">
            <a href="#" id="back-to-dash" class="flex items-center gap-3 text-white no-underline group">
                <div
                    class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center border border-white/10 group-hover:bg-primary/20 group-hover:border-primary/40 transition-all">
                    <span class="material-symbols-outlined text-sm">arrow_back</span>
                </div>
                <span class="font-display italic text-xl">Volver al Panel</span>
            </a>
            <div class="flex items-center gap-5">
                <div class="flex flex-col text-right">
                    <span id="header-coach-name"
                        class="font-display italic text-xl font-bold text-white leading-none">Cargando...</span>
                    <span class="text-[9px] text-amber-500 uppercase font-bold tracking-[0.2em] mt-1 opacity-80">Portal
                        Coach Admin v43.11</span>
                </div>
                <div class="w-12 h-12 rounded-2xl border border-white/10 overflow-hidden bg-white/5 relative">
                    <img id="header-coach-photo" src="" class="w-full h-full object-cover hidden">
                    <div id="header-coach-icon" class="w-full h-full flex items-center justify-center">
                        <span class="material-symbols-outlined text-primary text-2xl">person</span>
                    </div>
                </div>
            </div>
        </header>

        <main class="relative z-10 min-h-screen pt-32 pb-20 px-6">
            <div class="max-w-6xl mx-auto">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <!-- Left: Calendar Selection -->
                    <div class="lg:col-span-2">
                        <div class="glass-panel p-8 rounded-[2.5rem] border-white/10">
                            <div class="flex justify-between items-center mb-8">
                                <h2 id="current-month-year" class="font-display italic text-3xl text-white">Cargando...
                                </h2>
                                <div class="flex gap-2">
                                    <button id="prev-month"
                                        class="p-2 text-white hover:text-primary transition-colors"><span
                                            class="material-symbols-outlined">chevron_left</span></button>
                                    <button id="next-month"
                                        class="p-2 text-white hover:text-primary transition-colors"><span
                                            class="material-symbols-outlined">chevron_right</span></button>
                                </div>
                            </div>
                            <div class="grid grid-cols-7 gap-2">
                                <div class="text-center text-[10px] text-slate-500 font-bold py-2">LUN</div>
                                <div class="text-center text-[10px] text-slate-500 font-bold py-2">MAR</div>
                                <div class="text-center text-[10px] text-slate-500 font-bold py-2">MIÉ</div>
                                <div class="text-center text-[10px] text-slate-500 font-bold py-2">JUE</div>
                                <div class="text-center text-[10px] text-slate-500 font-bold py-2">VIE</div>
                                <div class="text-center text-[10px] text-red-500/50 font-bold py-2">SÁB</div>
                                <div class="text-center text-[10px] text-red-500/50 font-bold py-2">DOM</div>
                                <div id="calendar-grid" class="grid grid-cols-7 gap-2 col-span-7"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Right: Slot Management -->
                    <div>
                        <div id="slots-panel" class="glass-panel p-8 rounded-[2.5rem] border-white/10 sticky top-32">
                            <div class="text-center mb-8">
                                <span
                                    class="text-primary text-[10px] uppercase font-bold tracking-widest mb-2 block">Gestión
                                    del Día</span>
                                <h3 id="selected-date-display" class="font-display italic text-2xl text-white">
                                    Selecciona un día</h3>
                                <p class="text-slate-500 text-xs mt-2">Haz clic en un horario para cambiar su estado</p>
                            </div>
                            <div id="slots-container" class="grid grid-cols-2 gap-3"></div>
                            <div id="status-message" class="mt-8 text-center text-xs text-slate-400 hidden">
                                <span id="status-text">Actualizando...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { getMonthlyAvailability, getOccupiedSlots, getTenantMetadata, toggleOccupiedSlot } from '/src/firebase_v13.js';

        const params = new URLSearchParams(window.location.search);
        const tenantId = params.get('tenant') || 'master';
        let currentViewDate = new Date();
        let selectedDate = null;
        let monthlyStats = [];
        const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

        document.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('back-to-dash').href = `coach-dashboard.html?tenant=${tenantId}`;

            try {
                const metadata = await getTenantMetadata(tenantId);
                if (metadata) {
                    document.getElementById('header-coach-name').textContent = metadata.name || tenantId;
                    if (metadata.coachPhoto) {
                        const img = document.getElementById('header-coach-photo');
                        img.src = metadata.coachPhoto;
                        img.classList.remove('hidden');
                        document.getElementById('header-coach-icon').classList.add('hidden');
                    }
                }
            } catch (e) { console.error(e); }

            init();

            document.getElementById('prev-month').onclick = () => {
                currentViewDate.setMonth(currentViewDate.getMonth() - 1);
                init();
            };
            document.getElementById('next-month').onclick = () => {
                currentViewDate.setMonth(currentViewDate.getMonth() + 1);
                init();
            };
        });

        async function init() {
            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            document.getElementById('current-month-year').textContent = `${monthNames[month]} ${year}`;
            try {
                monthlyStats = await getMonthlyAvailability(year, month);
                await renderCalendar();
            } catch (e) { console.error(e); }
        }

        async function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDay = new Date(year, month, 1).getDay();
            const metadata = await getTenantMetadata(tenantId);
            const schedule = metadata?.schedule || { days: [1, 2, 3, 4, 5], startHour: 9, endHour: 17 };

            const today = new Date();
            today.setHours(0, 0, 0, 0);

            let startOffset = firstDay === 0 ? 6 : firstDay - 1;
            for (let i = 0; i < startOffset; i++) {
                grid.appendChild(document.createElement('div'));
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(year, month, day);
                date.setHours(0, 0, 0, 0);
                const dayOfWeek = date.getDay();
                const isPast = date.getTime() < today.getTime();
                const isConfiguredOff = !schedule.days.includes(dayOfWeek);
                const dateStr = `${year}-${(month + 1).toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;

                const btn = document.createElement('button');
                btn.className = `calendar-day-btn class-panel rounded-2xl flex flex-col justify-between ${selectedDate === dateStr ? 'calendar-day-active' : 'bg-white/5'}`;

                if (isPast || isConfiguredOff) {
                    btn.disabled = true;
                    btn.className += " opacity-20 cursor-not-allowed grayscale scale-95";
                }

                const occupiedCount = monthlyStats.filter(s => s.date === dateStr).length;
                btn.innerHTML = `
                    <span class="text-white font-bold">${day}</span>
                    <div class="text-[9px] uppercase tracking-tighter ${occupiedCount >= 10 ? 'text-red-400' : 'text-primary'}">
                        ${occupiedCount} OCUPADOS
                    </div>
                `;

                if (!isPast && !isConfiguredOff) {
                    btn.onclick = () => {
                        selectedDate = dateStr;
                        renderCalendar();
                        loadDaySlots(dateStr);
                    };
                }
                grid.appendChild(btn);
            }
        }

        async function loadDaySlots(dateStr) {
            const container = document.getElementById('slots-container');
            const display = document.getElementById('selected-date-display');
            display.textContent = dateStr;
            container.innerHTML = '<div class="col-span-2 text-center py-8">Cargando...</div>';

            try {
                const metadata = await getTenantMetadata(tenantId);
                const schedule = metadata?.schedule || { days: [1, 2, 3, 4, 5], startHour: 9, endHour: 17 };
                const occupied = await getOccupiedSlots(dateStr);
                container.innerHTML = '';

                const hours = [];
                for (let h = schedule.startHour; h <= schedule.endHour; h++) {
                    hours.push(h);
                }

                hours.forEach(h => {
                    const time = `${h.toString().padStart(2, '0')}:00`;
                    const isOccupied = occupied.includes(time);
                    const btn = document.createElement('div');
                    btn.className = `slot-btn ${isOccupied ? 'slot-occupied' : 'slot-free'}`;
                    btn.innerHTML = `
                        <div class="text-xs font-bold">${h > 12 ? h - 12 : h}:00 ${h >= 12 ? 'PM' : 'AM'}</div>
                        <div class="text-[8px] uppercase mt-1 opacity-70">${isOccupied ? 'OCUPADO' : 'LIBRE'}</div>
                    `;
                    btn.onclick = () => toggleSlot(dateStr, time, isOccupied);
                    container.appendChild(btn);
                });
            } catch (e) {
                container.innerHTML = '<div class="col-span-2 text-center py-8 text-red-500">Error al cargar</div>';
            }
        }

        async function toggleSlot(date, time, currentStatus) {
            const statusMsg = document.getElementById('status-message');
            const statusText = document.getElementById('status-text');
            statusMsg.classList.remove('hidden');
            statusText.textContent = "Actualizando...";
            try {
                await toggleOccupiedSlot(date, time, !currentStatus);
                statusText.textContent = "¡Actualizado!";
                setTimeout(() => statusMsg.classList.add('hidden'), 2000);
                init();
                loadDaySlots(date);
            } catch (err) {
                statusText.textContent = "Error";
            }
        }
    </script>
</body>

</html>
