<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Manual | Reconecta Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,700;1,6..72,400&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/src/index.css">
    <style>
        .calendar-day-btn {
            height: 100px;
            padding: 0.5rem;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .calendar-day-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.05);
        }

        .calendar-day-active {
            border-color: var(--primary) !important;
            background: rgba(var(--primary-rgb), 0.1);
        }

        .slot-btn {
            padding: 0.75rem;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
            text-align: center;
            cursor: pointer;
        }

        .slot-occupied {
            background: #ef4444 !important;
            border-color: #ef4444;
            color: white;
        }

        .slot-free {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.3);
            color: #22c55e;
        }

        .slot-free:hover {
            background: rgba(34, 197, 94, 0.2);
        }
    </style>
</head>

<body class="overflow-x-hidden bg-[#050f0f]">
    <div id="app">
        <header
            class="fixed top-0 w-full z-50 px-6 py-4 flex justify-between items-center backdrop-blur-md border-b border-white/10 bg-black/10">
            <a href="/admin.html" class="flex items-center gap-2 text-white no-underline">
                <span class="material-symbols-outlined">arrow_back</span>
                <span class="font-display italic text-xl">Volver al Panel</span>
            </a>
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary text-2xl">event_available</span>
                <span class="font-display italic text-xl font-bold text-white">Agenda Manual</span>
            </div>
        </header>

        <main class="relative z-10 min-h-screen pt-32 pb-20 px-6">
            <div class="max-w-6xl mx-auto">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

                    <!-- Left: Calendar Selection -->
                    <div class="lg:col-span-2">
                        <div class="glass-panel p-8 rounded-[2.5rem] border-white/10">
                            <div class="flex justify-between items-center mb-8">
                                <h2 id="current-month-year" class="font-display italic text-3xl text-white">Marzo 2026
                                </h2>
                                <div class="flex gap-2">
                                    <button id="prev-month"
                                        class="p-2 text-white hover:text-primary transition-colors"><span
                                            class="material-symbols-outlined">chevron_left</span></button>
                                    <button id="next-month"
                                        class="p-2 text-white hover:text-primary transition-colors"><span
                                            class="material-symbols-outlined">chevron_right</span></button>
                                </div>
                            </div>

                            <div class="grid grid-cols-7 gap-2">
                                <!-- Headers -->
                                <div class="text-center text-[10px] text-slate-500 font-bold py-2">LUN</div>
                                <div class="text-center text-[10px] text-slate-500 font-bold py-2">MAR</div>
                                <div class="text-center text-[10px] text-slate-500 font-bold py-2">MIÉ</div>
                                <div class="text-center text-[10px] text-slate-500 font-bold py-2">JUE</div>
                                <div class="text-center text-[10px] text-slate-500 font-bold py-2">VIE</div>
                                <div class="text-center text-[10px] text-red-500/50 font-bold py-2">SÁB</div>
                                <div class="text-center text-[10px] text-red-500/50 font-bold py-2">DOM</div>

                                <div id="calendar-grid" class="grid grid-cols-7 gap-2 col-span-7">
                                    <!-- Days injected here -->
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Right: Slot Management -->
                    <div>
                        <div id="slots-panel" class="glass-panel p-8 rounded-[2.5rem] border-white/10 sticky top-32">
                            <div class="text-center mb-8">
                                <span
                                    class="text-primary text-[10px] uppercase font-bold tracking-widest mb-2 block">Gestión
                                    del Día</span>
                                <h3 id="selected-date-display" class="font-display italic text-2xl text-white">
                                    Selecciona un día</h3>
                                <p class="text-slate-500 text-xs mt-2">Haz clic en un horario para cambiar su estado</p>
                            </div>

                            <div id="slots-container" class="grid grid-cols-2 gap-3">
                                <!-- Slots injected here -->
                            </div>

                            <div id="status-message" class="mt-8 text-center text-xs text-slate-400 hidden">
                                <span id="status-text">Actualizando...</span>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { getMonthlyAvailability, getOccupiedSlots } from '/src/firebase_v13.js';

        const PROJECT_ID = "reconecta-ed650";
        const API_KEY = "AIzaSyAP36MKFxUd37pxaSdsJzBvXmdK7wV1XZM";

        let currentViewDate = new Date();
        let selectedDate = null;
        let monthlyStats = [];

        const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

        document.addEventListener('DOMContentLoaded', () => {
            // Check auth
            if (sessionStorage.getItem('reconecta_admin_auth') !== 'true') {
                window.location.href = '/admin.html';
                return;
            }

            init();

            document.getElementById('prev-month').onclick = () => {
                currentViewDate.setMonth(currentViewDate.getMonth() - 1);
                init();
            };
            document.getElementById('next-month').onclick = () => {
                currentViewDate.setMonth(currentViewDate.getMonth() + 1);
                init();
            };
        });

        async function init() {
            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            document.getElementById('current-month-year').textContent = `${monthNames[month]} ${year}`;

            try {
                monthlyStats = await getMonthlyAvailability(year, month);
                renderCalendar();
            } catch (e) {
                console.error(e);
            }
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            const year = currentViewDate.getFullYear();
            const month = currentViewDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDay = new Date(year, month, 1).getDay();

            // Monday start adjustment
            let startOffset = firstDay === 0 ? 6 : firstDay - 1;

            for (let i = 0; i < startOffset; i++) {
                grid.appendChild(document.createElement('div'));
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${(month + 1).toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
                const btn = document.createElement('button');
                btn.className = `calendar-day-btn class-panel rounded-2xl flex flex-col justify-between ${selectedDate === dateStr ? 'calendar-day-active' : ''}`;

                const occupiedCount = monthlyStats.filter(s => s.date === dateStr).length;

                btn.innerHTML = `
                    <span class="text-white font-bold">${day}</span>
                    <div class="text-[9px] uppercase tracking-tighter ${occupiedCount >= 9 ? 'text-red-400' : 'text-primary'}">
                        ${occupiedCount}/9 OCUPADOS
                    </div>
                `;

                btn.onclick = () => {
                    selectedDate = dateStr;
                    renderCalendar();
                    loadDaySlots(dateStr);
                };
                grid.appendChild(btn);
            }
        }

        async function loadDaySlots(dateStr) {
            const container = document.getElementById('slots-container');
            const display = document.getElementById('selected-date-display');
            display.textContent = dateStr;
            container.innerHTML = '<div class="col-span-2 text-center py-8">Cargando...</div>';

            try {
                const occupied = await getOccupiedSlots(dateStr);
                container.innerHTML = '';

                const hours = [9, 10, 11, 12, 13, 14, 15, 16, 17];
                hours.forEach(h => {
                    const time = `${h.toString().padStart(2, '0')}:00`;
                    const isOccupied = occupied.includes(time);

                    const btn = document.createElement('div');
                    btn.className = `slot-btn ${isOccupied ? 'slot-occupied' : 'slot-free'}`;
                    btn.innerHTML = `
                        <div class="text-xs font-bold">${h > 12 ? h - 12 : h}:00 ${h >= 12 ? 'PM' : 'AM'}</div>
                        <div class="text-[8px] uppercase mt-1 opacity-70">${isOccupied ? 'OCUPADO' : 'LIBRE'}</div>
                    `;

                    btn.onclick = () => toggleSlot(dateStr, time, isOccupied);
                    container.appendChild(btn);
                });
            } catch (e) {
                container.innerHTML = '<div class="col-span-2 text-center py-8 text-red-500">Error al cargar</div>';
            }
        }

        async function toggleSlot(date, time, currentStatus) {
            const statusMsg = document.getElementById('status-message');
            const statusText = document.getElementById('status-text');
            statusMsg.classList.remove('hidden');
            statusText.textContent = "Actualizando...";

            try {
                const docUrl = `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/days/${date}?key=${API_KEY}`;

                // Get current times
                const getResp = await fetch(docUrl);
                let currentTimes = [];
                if (getResp.ok) {
                    const data = await getResp.json();
                    if (data.fields && data.fields.times && data.fields.times.arrayValue) {
                        currentTimes = data.fields.times.arrayValue.values?.map(v => v.stringValue) || [];
                    }
                }

                if (currentStatus) {
                    // Libertar: remove from array
                    currentTimes = currentTimes.filter(t => t !== time);
                } else {
                    // Ocupar: add to array
                    if (!currentTimes.includes(time)) currentTimes.push(time);
                }

                // Patch
                const body = {
                    fields: {
                        times: {
                            arrayValue: {
                                values: currentTimes.map(t => ({ stringValue: t }))
                            }
                        }
                    }
                };

                const patchResp = await fetch(docUrl, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                if (patchResp.ok) {
                    statusText.textContent = "¡Actualizado con éxito!";
                    setTimeout(() => statusMsg.classList.add('hidden'), 2000);
                    init(); // Reload calendar stats
                    loadDaySlots(date); // Reload slots
                } else {
                    throw new Error("Failed to patch");
                }

            } catch (err) {
                statusText.textContent = "Error al actualizar";
                console.error(err);
            }
        }
    </script>
</body>

</html>
